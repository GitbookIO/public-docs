site:
  title: GitBook Documentation (WIP)
  structure:
    - type: section-group
      key: group-1
      title: Developers
      icon: code
      children:
        - type: section
          key: section-developers
          title: API
          path: api
          description: Build with the GitBook API
          icon: brackets-curly
          children:
            - type: space
              key: space-developers
